# For documentation and available settings, see
# https://github.com/srid/emanote/blob/master/emanote/default/index.yaml
page:
  siteTitle: NaiNai
  siteName: nainai
  siteUrl: ""

  headHtml: |
    <snippet var="js.mermaid" />
    <snippet var="js.mathjax" />
    <snippet var="js.prism" />

template:
  name: /templates/layouts/layout
  theme: purple
  # sidebar:
  #   collapsed: true
  urlStrategy: pretty
  iconUrl: ${ema:homeUrl}header.png

pandoc:
  rewriteClass:
    prose: max-w-prose mx-auto
    greenery: bg-green-100 text-green-700 font-bold text-3xl

js:
  # Diagrams using mermaid.js
  mermaid: |
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
      var myMermaidConfig = {
        // lets mermaid work with emanote live-reloading
        startOnLoad: true,
        // permit clicks
        securityLevel: "loose",
        // set default theme with primary colour to tailwind blue
        theme: "base",
        themeVariables: {
          primaryColor: "#e0e7ff",
          secondaryColor: "#fffde0"
        },
        // d3js rounded lines in flowcharts
        flowchart: {
          curve: "basis",
          htmlLabels: true
        }
      };
      mermaid.initialize(myMermaidConfig);
      mermaid.init(myMermaidConfig, document.querySelectorAll(".mermaid"));
    </script>
  # Syntax highlighting with Prism.js
  prism: |
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-twilight.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-docker.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-tfscript.min.js"></script>
